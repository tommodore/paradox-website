<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0b12"/>
      <stop offset="50%" stop-color="#0d0d1a"/>
      <stop offset="100%" stop-color="#0b0b12"/>
    </linearGradient>
    <linearGradient id="text-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#67e8f9"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="600" y="240" text-anchor="middle" font-family="Georgia, serif" font-size="48" font-weight="bold" fill="url(#text-grad)" filter="url(#glow)">paradox.cat</text>
  <text x="600" y="310" text-anchor="middle" font-family="Georgia, serif" font-size="32" font-style="italic" fill="#94a3b8">The cat is both alive and dead.</text>
  <text x="600" y="360" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#64748b">Until you look.</text>
  <text x="600" y="440" text-anchor="middle" font-family="Georgia, serif" font-size="28" font-style="italic" fill="#6366f1">Quantum Superposition · Schrödinger's Cat</text>
  <circle cx="200" cy="460" r="3" fill="#67e8f9" opacity="0.6"/>
  <circle cx="350" cy="180" r="2" fill="#6366f1" opacity="0.4"/>
  <circle cx="850" cy="500" r="2.5" fill="#67e8f9" opacity="0.5"/>
  <circle cx="950" cy="150" r="2" fill="#6366f1" opacity="0.3"/>
</svg>
